name: Deploy to GitHub Pages

# Публікація тепер іде напряму з гілки main (Settings → Pages → Deploy from a branch).
# Цей workflow залишено лише для ручного запуску на випадок повернення на Actions-деплой.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Черга Pages буває повільною — чекаємо до 30 хв замість стандартних 10
          timeout: 1800000
